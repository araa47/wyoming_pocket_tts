---
# Home Assistant Add-on Configuration
# https://developers.home-assistant.io/docs/add-ons/configuration

name: Wyoming Pocket TTS
version: 1.4.2
slug: wyoming_pocket_tts
description: >-
    Fast, local text-to-speech with voice cloning using Kyutai Pocket TTS.
    Runs on CPU at ~10x realtime speed. Built-in voices work immediately;
    add a Hugging Face token only when using custom voice cloning.
url: https://github.com/araa47/wyoming_pocket_tts
arch:
    - amd64
    - aarch64

# Startup configuration
init: false
startup: application
boot: auto

# Auto-discovery via Wyoming protocol
discovery:
    - wyoming

# Network
ports:
    10200/tcp:
ports_description:
    10200/tcp: Wyoming protocol

# Host access
host_network: false
hassio_api: false
homeassistant_api: false

# Storage
map:
    - share:rw # For custom voice samples in /share/tts-voices

# Configuration options exposed in UI.
# Voice names go in `voices` — type them out (see the Documentation tab or the
# field help for the full built-in list, or use a custom filename without its
# extension). Each listed voice is preloaded for fast first response and is the
# only set advertised to Home Assistant. Leave `voices` empty to fall back to
# advertising every built-in + custom voice (loaded on demand).
options:
    language: en
    voices:
        - alba
    voices_dir: /share/tts-voices
    hf_token: ''
    debug: false

schema:
    language: list(en|fr|de|pt|it|es|fr_24l|de_24l|pt_24l|it_24l|es_24l)
    voices:
        - str
    voices_dir: str
    hf_token: password?
    debug: bool

# Environment
environment:
    HF_TOKEN: '{{ .hf_token }}'

# Panel
panel_icon: mdi:text-to-speech
panel_title: Pocket TTS

# Documentation
# Note: Remove or comment out 'image' line for local add-on builds
# image: ghcr.io/araa47/wyoming-pocket-tts-{arch}
