---
# Home Assistant Add-on Configuration
# https://developers.home-assistant.io/docs/add-ons/configuration

name: Wyoming Pocket TTS
version: 1.4.0
slug: wyoming_pocket_tts
description: >-
    Fast, local text-to-speech with voice cloning using Kyutai Pocket TTS.
    Runs on CPU at ~10x realtime speed. Built-in voices work immediately;
    add a Hugging Face token only when using custom voice cloning.
url: https://github.com/araa47/wyoming_pocket_tts
arch:
    - amd64
    - aarch64

# Startup configuration
init: false
startup: application
boot: auto

# Auto-discovery via Wyoming protocol
discovery:
    - wyoming

# Network
ports:
    10200/tcp:
ports_description:
    10200/tcp: Wyoming protocol

# Host access
host_network: false
hassio_api: false
homeassistant_api: false

# Storage
map:
    - share:rw # For custom voice samples in /share/tts-voices

# Configuration options exposed in UI
options:
    voice: alba
    language: en
    voices_dir: /share/tts-voices
    preload_voices: []
    debug: false
    hf_token: ''

schema:
    voice: select(alba|anna|azelma|bill_boerst|caro_davy|charles|cosette|eponine|eve|fantine|george|jane|jean|javert|marius|mary|michael|paul|peter_yearsley|stuart_bell|vera|estelle|juergen|rafael|giovanni|lola)
    language: select(en|fr|de|pt|it|es|fr_24l|de_24l|pt_24l|it_24l|es_24l)
    voices_dir: str
    preload_voices:
        - str
    debug: bool
    hf_token: password?

options_description:
    voice: >-
        Default built-in voice. Custom voice files in voices_dir are selected
        from Home Assistant by filename after the Wyoming integration is reloaded.
    language: >-
        Pocket TTS language/model to load. Pick the language that matches your
        text and custom voice samples.
    voices_dir: >-
        Folder for custom voice samples. Create /share/tts-voices, place
        <voice_name>.ogg, .wav, .mp3, .flac, or .m4a files there, then use the
        filename without extension as the voice name.
    preload_voices: >-
        Optional voice names to load at startup, one per list item. Leave empty
        to preload only the default voice. Use all only on hosts with enough RAM.
    debug: Show verbose logs for troubleshooting.
    hf_token: >-
        Optional Hugging Face read token. Required only for custom voice cloning
        after accepting Kyutai's Pocket TTS model terms.

# Environment
environment:
    HF_TOKEN: '{{ .hf_token }}'

# Panel
panel_icon: mdi:text-to-speech
panel_title: Pocket TTS

# Documentation
# Note: Remove or comment out 'image' line for local add-on builds
# image: ghcr.io/araa47/wyoming-pocket-tts-{arch}
